name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project files directly
      run: |
        unzip -o pro_camera_app.zip
        if [ ! -f "pubspec.yaml" ]; then
          mv */* . 2>/dev/null || true
          mv * . 2>/dev/null || true
        fi

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Fix Android V2 Embedding & Build App
      run: |
        # البحث عن مجلد المشروع الحقيقي والدخول إليه
        TARGET_DIR="."
        if [ ! -f "pubspec.yaml" ]; then
          TARGET_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \;)
        fi
        cd $TARGET_DIR
        
        # أمر سحري لتحديث إعدادات الأندرويد وإصلاح مشكلة الـ Embedding v2 تلقائياً
        flutter create --platforms android .
        
        # جلب المكتبات وبناء التطبيق
        flutter pub get
        flutter build apk --release --target-platform android-arm64

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lumina-Pro-AI-APK
        path: "**/build/app/outputs/flutter-apk/app-release.apk"
        
