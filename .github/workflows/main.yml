name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate project and normalize root
        run: |
          echo "Repository root contents before fix:"
          ls -la

          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Found zip file: $ZIP_FILE - extracting..."
            unzip -o "$ZIP_FILE" -d .
          fi

          PUBSPEC_PATH=$(find . -maxdepth 4 -iname "pubspec.yaml" | head -n 1)

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "ERROR: pubspec.yaml not found anywhere in the repository."
            echo "Full repository listing for debugging:"
            find . -maxdepth 4
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "Found pubspec.yaml at: $PUBSPEC_PATH"
          echo "Project directory: $PROJECT_DIR"

          if [ "$PROJECT_DIR" != "." ]; then
            echo "Merging project contents from $PROJECT_DIR into repository root..."
            rsync -a --exclude='.github' "$PROJECT_DIR"/ .
            rm -rf "$PROJECT_DIR"
          fi

          echo "Repository root contents after fix:"
          ls -la

      - name: Setup Java (required by Android Gradle Plugin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper files
        run: |
          cd android
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          cd ..

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pro-camera-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
