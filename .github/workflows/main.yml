name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project files directly
      run: |
        # فك الضغط مباشرة في المجلد الحالي والبحث عن ملف pubspec لتنظيم المسار
        unzip -o pro_camera_app.zip
        if [ ! -f "pubspec.yaml" ]; then
          echo "Moving files from subfolder..."
          mv */* . 2>/dev/null || true
          mv * . 2>/dev/null || true
        fi

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Get dependencies
      run: |
        # التأكد من الانتقال للمجلد الذي يحتوي على pubspec.yaml إذا كان داخل مجلد فرعي
        if [ -f "pubspec.yaml" ]; then
          flutter pub get
        else
          cd $(find . -name "pubspec.yaml" -exec dirname {} \;)
          flutter pub get
        fi

    - name: Build APK
      run: |
        if [ -f "pubspec.yaml" ]; then
          flutter build apk --release --target-platform android-arm64
        else
          cd $(find . -name "pubspec.yaml" -exec dirname {} \;)
          flutter build apk --release --target-platform android-arm64
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lumina-Pro-AI-APK
        path: "**/build/app/outputs/flutter-apk/app-release.apk"
        
